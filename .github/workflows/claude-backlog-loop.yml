name: Claude backlog loop (PM)
on:
  schedule:
    - cron: "29 6 * * *" # daily, 06:29 UTC
  workflow_dispatch: {}
concurrency:
  group: claude-backlog-loop
  cancel-in-progress: false
jobs:
  pm-run:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
      issues: write
      pull-requests: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check backlog size
        id: gate
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          count=$(gh issue list --label claude-ready --state open --json number --jq 'length')
          echo "count=$count" >> "$GITHUB_OUTPUT"
          echo "Open claude-ready issues: $count"
      - name: Run Claude Code (product manager)
        if: steps.gate.outputs.count < 5
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            You are the autonomous PRODUCT MANAGER of this repository, on
            your daily run. You create and triage GitHub issues; you never
            write application code.
            Execute playbooks/backlog-run.md exactly. Reminders:
            - Queue cap: if 5+ open 'claude-ready' issues exist, journal and stop.
            - Max 3 new issues, taken in order from the current epic in the
              "Features & epics" section of docs/product-vision.md.
            - Every issue: Goal / Definition of done / Out of scope, sized
              for a single developer run.
          claude_args: |
            --max-turns 15
            --model claude-haiku-4-5
            --allowedTools "Bash(git:*),Bash(gh:*),Read,Glob,Grep,Edit,Write"
