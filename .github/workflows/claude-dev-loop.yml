name: Claude dev loop

on:
  schedule:
    - cron: "17 */2 * * *" # every 2 hours (odd minute avoids the top-of-hour rush)
  workflow_dispatch: {} # manual trigger for testing

concurrency:
  group: claude-dev-loop
  cancel-in-progress: false # never kill a run mid-implementation

jobs:
  dev-run:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history: Claude reads the journal and git log

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Run Claude Code
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            You are the autonomous developer of this repository, on your
            scheduled 2-hour run.

            Execute playbooks/dev-run.md exactly. Reminders:
            - ONE task only. Read CLAUDE.md first — its rules are absolute.
            - A no-op is a valid outcome. Do not invent work.
            - Everything ships via branch + PR, never direct to main.
            - Append your journal entry to journal.md before finishing.
          claude_args: |
            --max-turns 60
