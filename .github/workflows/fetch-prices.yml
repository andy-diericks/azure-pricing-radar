name: Fetch Azure prices

on:
  schedule:
    - cron: "43 * * * *" # hourly; offset from the Claude loop
  workflow_dispatch: {}

concurrency:
  group: fetch-prices
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Fetch prices and compute diff
        run: python scripts/fetch_prices.py

      - name: Commit data updates
        run: |
          git config user.name "pricing-radar-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "No price changes this hour."
          else
            git commit -m "data: price snapshot $(date -u +'%Y-%m-%dT%H:%M')"
            git push
          fi
